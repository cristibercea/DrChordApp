<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E293B" />
      <stop offset="100%" stop-color="#0F172A" />
    </linearGradient>

    <linearGradient id="pickGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#334155" />
      <stop offset="100%" stop-color="#020617" />
    </linearGradient>

    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" rx="60" ry="60" fill="url(#bgGrad)" stroke="#334155" stroke-width="2"/>

  <g stroke="#94A3B8" opacity="0.3">
    <line x1="16" y1="106" x2="16" y2="406" stroke="#E2E8F0" stroke-width="10" stroke-linecap="round"/>

    <line x1="16" y1="106" x2="496" y2="106" stroke-width="6"/>
    <line x1="16" y1="166" x2="496" y2="166" stroke-width="6"/>
    <line x1="16" y1="226" x2="496" y2="226" stroke-width="6"/>
    <line x1="16" y1="286" x2="496" y2="286" stroke-width="6"/>
    <line x1="16" y1="346" x2="496" y2="346" stroke-width="6"/>
    <line x1="16" y1="406" x2="496" y2="406" stroke-width="6"/>

    <line x1="136" y1="106" x2="136" y2="406" stroke-width="4"/>
    <line x1="256" y1="106" x2="256" y2="406" stroke-width="4"/> <line x1="376" y1="106" x2="376" y2="406" stroke-width="4"/>
    <line x1="496" y1="106" x2="496" y2="406" stroke-width="4"/>
  </g>

  <g transform="translate(256, 256)">
    
    <path d="M -100 -170
             Q 120 -170 220 -40
             Q 250 0 220 40
             Q 120 170 -100 170
             Q -200 170 -200 0
             Q -200 -170 -100 -170 Z"
          fill="url(#pickGrad)"
          stroke="#00E5FF"
          stroke-width="6"
          stroke-opacity="0.8"
          filter="url(#neonGlow)"/>

    <g fill="#FFFFFF">
      <rect x="-128" y="-20"  width="20" height="40"  rx="10" /> <rect x="-88"  y="-40"  width="20" height="80"  rx="10" />
      <rect x="-48"  y="-70"  width="20" height="140" rx="10" />
      <rect x="-8"   y="-100" width="20" height="200" rx="10" /> <rect x="32"   y="-80"  width="20" height="160" rx="10" />
      <rect x="72"   y="-50"  width="20" height="100" rx="10" />
      <rect x="112"  y="-24"  width="20" height="48"  rx="10" /> </g>
  </g>

</svg>
